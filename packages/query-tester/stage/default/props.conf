# Props for query_tester.log — JSON-structured logging.
# Splunk monitors this file via $SPLUNK_HOME/var/log/splunk/ and indexes
# it into index=_internal. This stanza ensures JSON auto-extraction.

[source::...query_tester.log]
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
KV_MODE = json
TIME_PREFIX = "timestamp"\s*:\s*"
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%3NZ
MAX_TIMESTAMP_LOOKAHEAD = 30
TRUNCATE = 50000
