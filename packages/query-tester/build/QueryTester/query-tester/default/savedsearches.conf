# Nightly janitor: trims test_run_history to the most recent 20 records
# per scheduled test. Disabled by default — enable after deployment.
#
# How it works:
#   1. Load all run history records via inputlookup
#   2. Sort each scheduledTestId group by ranAt descending
#   3. Number rows within each group (row_number)
#   4. Keep only the first 20 rows per group
#   5. Write the trimmed set back, replacing the collection
#
# To enable: Settings > Searches, reports, and alerts > query_tester_trim_run_history > Enable

[query_tester_trim_run_history]
search = | inputlookup test_run_history_lookup \
| sort 0 scheduledTestId -ranAt \
| streamstats count as row_number by scheduledTestId \
| where row_number <= 20 \
| fields - row_number \
| outputlookup test_run_history_lookup
dispatch.earliest_time = -1d
dispatch.latest_time = now
cron_schedule = 0 2 * * *
enableSched = 0
disabled = 1
description = Trims test_run_history KVStore collection to the 20 most recent runs per scheduled test. Enable after deployment.
