# KVStore lookup definitions — makes collections queryable via | inputlookup
# and visible in Settings > Lookups > Lookup definitions.

[saved_tests_lookup]
external_type = kvstore
collection = saved_tests
fields_list = id, name, app, testType, validationType, createdAt, updatedAt, createdBy, scenarioCount, description, version

[scheduled_tests_lookup]
external_type = kvstore
collection = scheduled_tests
fields_list = id, testId, testName, app, savedSearchOrigin, cronSchedule, enabled, createdAt, createdBy, lastRunAt, lastRunStatus, alertOnFailure, emailRecipients, version

[test_run_history_lookup]
external_type = kvstore
collection = test_run_history
fields_list = id, scheduledTestId, testId, ranBy, triggerType, ranAt, status, durationMs, splSnapshotHash, splDriftDetected, splDriftDetails, resultSummary, scenarioResults
